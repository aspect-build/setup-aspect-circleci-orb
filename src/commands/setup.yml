description: >
  Configure the Aspect Workflows runner for raw `bazel` calls: wait for cache
  warming to complete and write the Workflows-tuned /etc/bazel.bazelrc via
  `rosetta bazelrc`.

  Add this as a step after `checkout` and before any step that calls `bazel`
  directly. `rosetta bazelrc` reads the workspace's `.bazelversion`, so the repo
  must already be checked out (CWD = the workspace root). On a non-Workflows
  runner the command no-ops gracefully.

steps:
  - run:
      name: "Aspect Workflows: configure bazel"
      command: <<include(scripts/setup.sh)>>
