version: 2.1

description: >
  Prepares an Aspect Workflows CI runner so that raw `bazel` calls — not just
  `aspect <task>` — route through the runner's caching infrastructure. The
  `setup` command waits for the runner's cache warming to complete and generates
  a Bazel rc via `aspect ci bazelrc` (falling back to the runner-provided
  `rosetta` on older runners). The CircleCI counterpart of
  aspect-build/setup-aspect (GitHub Actions) and
  aspect-build/setup-aspect-buildkite-plugin (Buildkite).

display:
  home_url: https://docs.aspect.build/workflows
  source_url: https://github.com/aspect-build/setup-aspect-circleci-orb
